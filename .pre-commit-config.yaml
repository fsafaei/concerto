repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # --unsafe lets check-yaml parse PyYAML constructor tags
        # used by MkDocs / pymdownx (e.g. the !!python/name tag that
        # registers the Mermaid custom fence in mkdocs.yml).
        args: ["--unsafe"]
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.380
    hooks:
      - id: pyright
        # The harl-fork patch files under scripts/harl-fork-patches/
        # import from harl.*, which is not installed in this repo's
        # virtualenv (the fork doesn't exist yet — the patches are
        # scaffolding to be applied to it). They will be type-checked
        # in the harl-fork's own CI once applied.
        exclude: ^scripts/harl-fork-patches/

  - repo: https://github.com/astral-sh/uv-pre-commit
    # 0.11.14 (latest stable at 2026-05-16) — bumped from 0.4.18 so the
    # uv-lock hook understands PEP 735 [dependency-groups] entries. The
    # 0.4.18 release predates PEP 735 lock support and silently drops
    # train-group packages (and their transitives — harl, grpcio,
    # tensorboard, …) from uv.lock, which breaks
    # `uv sync --group train` reproducibility. See ADR-002
    # §Revision-history 2026-05-16 / #131 for the dep-group rationale.
    rev: 0.11.14
    hooks:
      - id: uv-lock

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.29.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: tooling-leak-grep
        name: Block AI-tooling mentions
        entry: scripts/check_no_ai_mentions.sh
        language: script
        pass_filenames: false
        stages: [pre-commit, pre-push]
