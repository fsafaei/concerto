decision_rules: >
  All four checks are wrapped committed evidence; a wrapped straddle is
  FAIL (committed evidence cannot consume the seed extension), so the
  extension seeds are unreachable and every outcome is final on the first
  application of its rule. A1 PASS iff the wrapped a1_reference bundle's
  recomputed seed-cluster success CI-lower >= tau_solv (0.95) AND its
  successful-episode stress peak <= stress_limit (130.5697 N). A2 PASS
  iff the wrapped a2_single_arm bundle's recomputed success CI-upper <=
  tau_infeasible (0.05). A3 PASS iff the recomputed paired-cluster
  reference-minus-blind gap CI-lower >= delta_min (0.20), paired on the
  two bundles' identical committed initial-state schedules and the pinned
  A3 bootstrap substream. A4 (ADR-027 §Admission A4) PASS iff EVERY
  admitted member's recomputed seed-cluster success CI-lower >= c_min_ego
  (0.75, the admitted set's capability floor C_min) AND every member's
  successful-episode stress peak <= stress_limit; FAIL iff any member's CI-upper < c_min_ego (brittle) or
  any CI straddles the floor (wrapped-straddle rule). Verdict per ADR-027:
  A1 FAIL => NOT_SOLVABLE (stop); A2 or A3 FAIL => CONTROL; A4 FAIL =>
  UNINSTRUMENTABLE (a construct/instrument finding, never a partner or
  axis result — ADR-026 §Decision 2); all PASS => ADMITTED. The
  per-partner ego-robustness profile is written to the report as the
  mandatory A4 artifact in every non-short-circuit case, whatever the
  verdict.
notes: >
  Grounds: ADR-027 §Admission A4 (gate added per review round R-2026-06-C
  condition 5); ADR-026 §Decision 2 (construct problems are never
  re-described as partner/axis results); ADR-016/I8 (wrap, never edit or
  re-run the immutable archives); ADR-002 P6 (pinned bootstrap
  substreams; byte-recomputable CIs); ADR-028 §Decisions 1-3 (bundle
  form). c_min_ego = C_min = 0.75 per the ADR-027 §Revision history
  2026-07-15 disambiguation (rev1's 0.95 was a corrected
  mis-specification), founder-directed 2026-07-15 before report
  production. Runner: chamber-eval admission --prereg
  spikes/preregistration/admission/cocarry_admission_a4_rev2.yaml --out
  spikes/results/admission/cocarry-a4-rev2-2026-07-15 --date 2026-07-15.
