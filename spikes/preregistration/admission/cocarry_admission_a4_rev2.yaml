# Pre-registration — cocarry@v1 re-issued Tier-2 admission with the A4
# ego-robustness gate (ADR-027 §Admission protocol; §Admission A4).
#
# Retrospective, wrap-only admission: ADR-027 §Validation criteria
# authorises the co-carry admission to be committed retroactively from its
# committed archives, and invariant I8 makes the archives the evidence —
# every check below WRAPS SHA-256-pinned committed files and re-extracts
# its statistics at report-build time; nothing is re-run, nothing is
# hand-copied. A1/A2/A3 wrap the cell bundles of the committed
# spikes/results/admission/cocarry-2026-07-05 archive (verdict ADMITTED
# under prereg-admission-cocarry-2026-07-05); A4 wraps the committed
# cocarry_partners@v1 leaderboard bundle of the b-aht instrument
# (spikes/results/benchmark/cocarry-v1/b-aht-2026-07-06, produced under
# prereg-cocarry-baselines-v1-rev2-2026-07-05) — the policy the ADR-027
# cross-partner contrasts use as their fixed measuring instrument.
#
# Thresholds are the committed cocarry admission family, verbatim
# (tau_solv 0.95, stress_limit 130.5697 N = the frozen rung-2 f_max,
# tau_infeasible 0.05, delta_min 0.20). The A4 floor c_min_ego inherits
# the admitted partner set's committed capability floor C_min = 0.75
# (cocarry_partners@v1, per-member floor in
# chamber.partners.set_definitions) per ADR-027 §Admission A4 as
# disambiguated in §Revision history 2026-07-15: C_min_ego is the
# ego-side analogue of C_min, and "the same success+stress bar" is the
# per-episode success+stress predicate, not the aggregate tau_solv —
# the tau_solv reading makes A4 unpassable by construction across a
# deliberately heterogeneous admitted set. Rev1 of this prereg
# (prereg-admission-cocarry-a4-2026-07-15) committed c_min_ego = 0.95
# under that mis-specified reading; it is corrected here, and the rev1
# tag and report remain in history as the record. The evidence being
# wrapped pre-exists this document (a retrospective admission, as with
# the handover-place wrap); the discipline this tag locks is that the
# floor and the decision rules are committed before the report artifact
# is produced and are never tuned against it afterward (ADR-007
# §Discipline).
