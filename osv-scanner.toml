# ----- 2026-05-20 batch: OSV-Scanner daily refresh surfaced advisories
# ----- on torch 2.8.0 / joblib 1.5.3 / markdown 3.10.2. Three classes:
# -----   (a) torch advisories with upstream fix in 2.9.0+ but blocked
# -----       by the cu12-vs-cu13 wheel-default coupling (torch 2.9+
# -----       wheels default to cuda 13, breaking the RTX 2080 dev box
# -----       on cuda 12.x driver). Deferred to the cu12-wheel-index
# -----       pinning follow-up PR; ignoreUntil = 2026-12-31.
# -----   (b) torch advisories without an upstream fix yet. Concerto's
# -----       attack-surface analysis: all listed advisories require
# -----       local access (AV:L) and target torch APIs the project does
# -----       not exercise in production (jit, profiler, pt2 loader,
# -----       flatbuffer module). No remote-exploitation vector.
# -----   (c) joblib + markdown: no upstream patched version available.
# -----       joblib's NumpyArrayWrapper.read_array is upstream-disputed
# -----       (only used during caching of trusted content); concerto's
# -----       checkpoint pipeline routes through torch.save / torch.load
# -----       (see concerto.training.checkpoints) and does not invoke
# -----       joblib for partner / ego weights. markdown is a docs-only
# -----       transitive (via mkdocs) — the DoS vector requires
# -----       attacker-controlled Markdown input, which the project's
# -----       docs build does not exercise.

