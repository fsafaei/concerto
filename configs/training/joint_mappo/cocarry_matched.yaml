# SPDX-License-Identifier: Apache-2.0
# B-JOINT training config: the jointly-trained MAPPO co-carry pair
# (ADR-011 §Decision as amended 2026-07-05; ADR-018 §Consequences;
# ADR-026 §Decision 1-2 + §Decision 4; ADR-002 §Decisions).
#
# Both seats learn (per-agent MAPPO actors + one shared central critic
# — param_sharing "per_agent", the recorded fact). Trains OUTSIDE the
# AHT setting by construction; evaluation is frozen-pair only (the
# ADR-018 contract). Hyperparameters mirror the B-AHT cell
# (ego_aht_happo/cocarry_matched.yaml) verbatim so the anchor
# comparison isolates joint training, not tuning; the budget is the
# same Rung-2 committed 300k frames — the CB-06 campaign prereg pins
# the per-row cap.
#
# Validates against chamber.benchmarks.joint_mappo_trainer.JointMAPPOConfig.

algo: joint_mappo
param_sharing: per_agent
seed: 0
total_frames: 300000
checkpoint_every: 50000
artifacts_root: ./artifacts

env:
  task: cocarry
  episode_length: 320
  # Seat order: agent_uids[0] maps to the pair checkpoint's actor_ego,
  # agent_uids[1] to actor_partner (the CB-06 zoo-v2 enrichment side).
  agent_uids: [panda_wristcam, panda_partner]
  condition_id: cocarry_matched_panda_pair
  num_envs: 1

# PPO hygiene: verbatim from the B-AHT cell (re-grounded 2026-06-18).
mappo:
  lr: 1.5e-4
  gamma: 0.9
  gae_lambda: 0.95
  clip_eps: 0.1
  n_epochs: 4
  rollout_length: 320
  batch_size: 320
  hidden_dim: 256

runtime:
  device: cuda
  deterministic_torch: false

# Same remediated-reward surface as B-AHT (ADR-026 §Decision 4): the
# excess-stress penalty is always-on in the env; transport PBRS parity.
shaping:
  settle_alpha: 0.0
  transport_pbrs_coeff: 1.0
