# SPDX-License-Identifier: Apache-2.0
# Hydra config for T4b.13 — empirical-guarantee experiment.
#
# ADR-002 risk-mitigation #1 / plan/05 §6 criterion 4: 100k-frame ego-AHT HAPPO
# run on the 2-agent MPE Cooperative-Push env (chamber.envs.mpe_cooperative_push)
# with one ego + one frozen scripted partner. Asserts moving-window-of-10
# non-decreasing ego reward on >=80% of intervals. Runtime budget: <=30 min CPU.
#
# Validates against concerto.training.config.EgoAHTConfig.

algo: ego_aht_happo
seed: 0
total_frames: 100000
checkpoint_every: 10000
artifacts_root: ./artifacts
log_dir: ./logs

wandb:
  enabled: false
  project: concerto-m4b

env:
  task: mpe_cooperative_push
  episode_length: 50
  agent_uids: [ego, partner]

# Frozen partner: ScriptedHeuristicPartner targeting (0, 0) (the centroid
# of the unit square). Combined with the ego (which trains via HAPPO),
# this produces the cooperative-coverage gradient T4b.13 measures.
partner:
  class_name: scripted_heuristic
  seed: 0
  checkpoint_step: null
  weights_uri: null
  extra:
    uid: partner
    target_xy: "0.0,0.0"
    action_dim: "2"

happo:
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_eps: 0.2
  n_epochs: 4
  rollout_length: 1024
  batch_size: 256
  hidden_dim: 64
