version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      ci:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "ci"

  # "uv", not "pip": pip-ecosystem PRs edit pyproject.toml without
  # regenerating uv.lock, so any `uv run` on the branch re-locks and
  # dirties the tree — which the reproducibility gates (smoke-eval,
  # readme-quickstart) correctly refuse (`chamber-eval run` exit 7).
  # The uv ecosystem updates pyproject.toml and uv.lock together.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      runtime-minor-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    ignore:
      # ADR-001 §Decision: ManiSkill v3 is pinned at 3.0.1 by SHA. The
      # wrapper-only extension contract requires this exact version
      # (private-API drift between minor releases would break our
      # wrappers silently). Bumping requires a new ADR + a full
      # wrapper sweep, not a dependabot PR.
      - dependency-name: "mani-skill"
      # ADR-002 §Decisions + plan/05 §2: the ``torch>=2.3,<2.6`` range
      # is the validated compatibility window for both
      # ``mani-skill==3.0.1`` and the ``harl@v0.1.0-aht`` fork. Bumping
      # outside that range would break compat; bumping inside it (e.g.
      # 2.5.0 → 2.5.1) requires a manual sweep of the test suite.
      # Either way the upgrade decision is a CONCERTO-side audit, not
      # a dependabot PR.
      - dependency-name: "torch"
      # ADR-008/ADR-014 eval extra: ``pandas>=1.4,<3.0`` is load-bearing —
      # rliable bounds ``arch<8.0``, and arch <8.0 raises ``TypeError`` on
      # import under pandas 3.x (``deprecate_kwarg`` signature change;
      # reproduced 2026-07-07 with pandas 3.0.3 + arch 7.2.0). Majors stay
      # blocked until rliable admits arch >= 8; minors/patches inside 2.x
      # remain fair game. In-repo record of the ignore registered on PR #290.
      - dependency-name: "pandas"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
