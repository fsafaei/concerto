name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5.4.1
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests

  type-check:
    name: type-check (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5.4.1
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run pyright

  test-unit:
    name: test-unit (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5.4.1
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run pytest tests/unit -n auto --no-cov

  test-property:
    name: test-property (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5.4.1
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      # Exit 5 ("no tests collected") is acceptable until Phase 1 adds property tests.
      - run: uv run pytest tests/property --no-cov || test $? -eq 5

  test-integration:
    name: test-integration (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5.4.1
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      # Exit 5 ("no tests collected") is acceptable until Phase 1 adds integration tests.
      - run: uv run pytest tests/integration -n auto -m "not gpu" --no-cov || test $? -eq 5

  coverage-gate:
    name: coverage-gate
    runs-on: ubuntu-latest
    needs: [test-unit, test-property, test-integration]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5.4.1
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run pytest --cov=concerto --cov=chamber --cov-fail-under=80 --cov-report=xml
      - uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4643565303  # v5.1.2
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docs-build:
    name: docs-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5.4.1
        with:
          python-version: "3.11"
      - run: uv sync --extra docs --group dev
      - run: uv run mkdocs build --strict

  licence-scan:
    name: licence-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5.4.1
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run pip-licenses --format=json --with-license-file --with-notice-file --output-file=licences.json
      - run: uv run python scripts/check_licences.py < licences.json

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5.4.1
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run cyclonedx-py environment -o sbom.spdx.json
      - uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1  # v4.6.1
        with:
          name: sbom
          path: sbom.spdx.json

  verify-no-ai-mentions:
    name: verify-no-ai-mentions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      - run: bash scripts/check_no_ai_mentions.sh
