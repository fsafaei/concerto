name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "README.md"
      - "docs/**"
      - "adr/**"
      - "mkdocs.yml"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "README.md"
      - "docs/**"
      - "adr/**"
      - "mkdocs.yml"
      # Catch release-please PRs (which only touch CHANGELOG + pyproject) for
      # the verify-changelog-completeness job below — closes #126.
      - "CHANGELOG.md"
      # Scripts backing CI gates (smoke-eval, README-table/cards drift,
      # changelog completeness): a script-only change must re-run its gate.
      - "scripts/**"

permissions:
  contents: read

jobs:
  lint:
    name: lint (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests

  type-check:
    name: type-check (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run pyright

  test-unit:
    name: test-unit (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      # The Rung-4 embodiment-heterogeneity tests build the xArm6 + Robotiq
      # kinematic chain; unlike the bundled panda, its URDF is a separate
      # ManiSkill asset (ADR-005), so fetch it on the runner (the EH
      # provider/controller Tier-1 tests parse it without SAPIEN/Vulkan).
      - run: uv run python -m mani_skill.utils.download_asset xarm6_robotiq -y
      - run: uv run pytest tests/unit -n auto --no-cov

  test-property:
    name: test-property (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run pytest tests/property --no-cov

  test-integration:
    name: test-integration (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # ADR-007 §Discipline: Stage-1 adapters (and the real-env
          # tests at tests/integration/test_stage1_{as,om}_real.py)
          # call chamber.evaluation.prereg.verify_git_tag, which
          # `git rev-parse`s pre-registration tags (e.g.
          # prereg-stage1-AS-2026-05-15). Default checkout ships
          # without tags, so without this the audit-chain pin would
          # red-x CI as a tag-missing PreregistrationError. Fetching
          # tags is cheap and matches the existing pattern below for
          # verify-changelog-completeness.
          fetch-tags: true
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run pytest tests/integration -n auto -m "not gpu" --no-cov

  coverage-gate:
    name: coverage-gate
    runs-on: ubuntu-latest
    needs: [test-unit, test-property, test-integration]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # ADR-007 §Discipline: same rationale as test-integration —
          # the unfiltered pytest collects tests/integration/test_stage1_*_real.py
          # which call verify_git_tag, so the prereg tags MUST be
          # present on the runner.
          fetch-tags: true
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      # xArm6 asset for the Rung-4 EH tests (see test-unit) — needed here so
      # the embodiment provider/controller code is covered for the floors.
      - run: uv run python -m mani_skill.utils.download_asset xarm6_robotiq -y
      - run: uv run pytest --cov=concerto --cov=chamber --cov-fail-under=80 --cov-report=xml
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docs-build:
    name: docs-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --extra docs --group dev
      - run: uv run mkdocs build --strict

  licence-scan:
    name: licence-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run pip-licenses --format=json --with-license-file --with-notice-file --output-file=licences.json
      - run: uv run python scripts/check_licences.py < licences.json

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run cyclonedx-py environment -o sbom.spdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom.spdx.json

  test-smoke:
    name: test-smoke (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      # GPU-less runners: Tier-1 (fake env) tests run; Tier-2 (real ManiSkill) tests skip.
      - run: uv run pytest -m smoke --no-cov

  verify-no-ai-mentions:
    name: verify-no-ai-mentions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - run: bash scripts/check_no_ai_mentions.sh

  verify-changelog-completeness:
    # Closes #126. Runs on every PR but is a no-op unless the PR's CHANGELOG
    # adds a new ## [X.Y.Z] section (i.e. the release-please PR). Needs full
    # history + tags so the previous release tag is reachable.
    name: verify-changelog-completeness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"
      # The script only uses Python stdlib (subprocess, re, pathlib), so a
      # full `uv sync` is not needed. `uv run --no-project` runs an ephemeral
      # interpreter without resolving the project env — fast and self-contained.
      - run: uv run --no-project python scripts/check_changelog_completeness.py

  verify-readme-tables:
    # Drift gate for the generated benchmark-suite surfaces (ADR-027):
    # the README task table and the docs/reference/tasks/ cards must
    # match a fresh render from the chamber.tasks registry. Needs the
    # project env (the render scripts import chamber.tasks).
    name: verify-readme-tables
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # The leaderboard drift check re-verifies every listed result
          # bundle, and the bundle verifier's prereg check `git
          # rev-parse`s the campaign pre-registration tags (ADR-007
          # §Discipline; ADR-028 §Decision 3). Default checkout ships
          # without tags — same rationale as the test-integration and
          # coverage-gate jobs above.
          fetch-tags: true
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run python scripts/render_task_table.py --check
      - run: uv run python scripts/render_task_cards.py --check
      - run: uv run python scripts/render_leaderboard_table.py --check
      # Every leaderboard row must trace to a documented, REPRO.txt-
      # faithful reproduction command (docs/how-to/reproduce-results.md).
      - run: uv run python scripts/check_repro_docs.py
      # The README quickstart must match what the smoke-eval /
      # readme-quickstart jobs actually execute.
      - run: uv run python scripts/check_readme_quickstart.py

  smoke-eval:
    # ADR-028 §Validation criteria 1: chamber-eval run → verify on a
    # fresh v3 bundle, then a one-byte tamper must make verify fail.
    # CPU-only, Tier-0 task; target < 5 minutes.
    name: smoke-eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: bash scripts/smoke_eval.sh

  readme-quickstart:
    # The README's five-minute quickstart promises its command blocks
    # run verbatim on a clean checkout; this job extracts the blocks
    # from README.md itself and executes them (no parallel copy that
    # could drift). Includes `chamber-eval verify` on a committed
    # leaderboard bundle, whose prereg check resolves the campaign tag
    # — hence fetch-tags.
    name: readme-quickstart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-tags: true
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run python scripts/check_readme_quickstart.py --execute
