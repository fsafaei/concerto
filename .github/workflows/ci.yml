name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v5.4.1
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests

  type-check:
    name: type-check (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v5.4.1
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run pyright

  test-unit:
    name: test-unit (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v5.4.1
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - run: uv run pytest tests/unit -n auto --no-cov

  test-property:
    name: test-property (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v5.4.1
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      # Exit 5 ("no tests collected") is acceptable until Phase 1 adds property tests.
      - run: uv run pytest tests/property --no-cov || test $? -eq 5

  test-integration:
    name: test-integration (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v5.4.1
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      # Exit 5 ("no tests collected") is acceptable until Phase 1 adds integration tests.
      - run: uv run pytest tests/integration -n auto -m "not gpu" --no-cov || test $? -eq 5

  coverage-gate:
    name: coverage-gate
    runs-on: ubuntu-latest
    needs: [test-unit, test-property, test-integration]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v5.4.1
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run pytest --cov=concerto --cov=chamber --cov-fail-under=80 --cov-report=xml
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docs-build:
    name: docs-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v5.4.1
        with:
          python-version: "3.11"
      - run: uv sync --extra docs --group dev
      - run: uv run mkdocs build --strict

  licence-scan:
    name: licence-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v5.4.1
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run pip-licenses --format=json --with-license-file --with-notice-file --output-file=licences.json
      - run: uv run python scripts/check_licences.py < licences.json

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v5.4.1
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - run: uv run cyclonedx-py environment -o sbom.spdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom.spdx.json

  test-smoke:
    name: test-smoke (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Only run when wrapper or smoke-runner sources change (ADR-007 §Stage 0).
    if: |
      contains(github.event.head_commit.modified, 'src/chamber/envs/') ||
      contains(github.event.head_commit.modified, 'src/chamber/benchmarks/stage0_smoke.py') ||
      github.event_name == 'pull_request'
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v5.4.1
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      # GPU-less runners: Tier-1 (fake env) tests run; Tier-2 (real ManiSkill) tests skip.
      # Exit 5 ("no tests collected") is acceptable if the -k filter produces an empty set.
      - run: uv run pytest -m smoke --no-cov || test $? -eq 5

  verify-no-ai-mentions:
    name: verify-no-ai-mentions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - run: bash scripts/check_no_ai_mentions.sh
