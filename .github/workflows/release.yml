name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@a02a34c4d625211b5b44cf2a8e96ab3b5db9ef9e  # v4.1.3
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: python
          package-name: concerto

  publish:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v5.4.1
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      # Generate SBOM and attach to release
      - run: uv run cyclonedx-py environment -o sbom.spdx.json
      - uses: softprops/action-gh-release@c95fe1489f96a7f55f2b4b87fab2f08e0e25dd4d  # v2.2.1
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: sbom.spdx.json
      # Publish to test.pypi.org for v0.x
      - run: uv build
      - run: uv publish --index testpypi
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_TOKEN }}
