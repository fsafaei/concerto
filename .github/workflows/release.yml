name: Release

on:
  push:
    branches: [main]
  # Manual re-fire for (re)publishing an already-tagged release —
  # recovering from a transient publish failure without rotating the
  # tag, or the one-time production-PyPI debut of an existing tag.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag being (re)published (e.g. v0.7.0).'
        required: true
        type: string
      ref:
        description: >-
          Git ref to build from; defaults to the tag. Override only for a
          metadata-only respin of an existing tag (e.g. a release/* branch
          cut from the tag with packaging fixes cherry-picked on top). The
          built version must still match the tag.
        required: false
        type: string
      publish_testpypi:
        description: >-
          Upload to TestPyPI. Disable when this exact version already
          exists there (the index rejects filename reuse).
        required: false
        type: boolean
        default: true
      publish_pypi:
        description: >-
          Upload to production PyPI (requires the "pypi" environment and
          its trusted-publisher mapping on pypi.org).
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release-please:
    # Skipped on workflow_dispatch — that path only republishes an
    # already-tagged release.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: python
          package-name: concerto-multirobot

  # Build once and share dist/ with both publish jobs, so TestPyPI and
  # production PyPI receive byte-identical artefacts. Nothing uploads
  # unless every pre-flight gate here passes.
  build:
    runs-on: ubuntu-latest
    needs: release-please
    if: |
      !cancelled() && (
        needs.release-please.outputs.release_created == 'true'
        || github.event_name == 'workflow_dispatch'
      )
    permissions:
      contents: write  # softprops/action-gh-release attaches SBOM to the GitHub release
      id-token: write  # Sigstore signing for build-provenance attestations
      attestations: write  # actions/attest-build-provenance writes SLSA provenance
    env:
      PUBLISH_TAG: ${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          ref: ${{ github.event.inputs.ref || github.event.inputs.tag || needs.release-please.outputs.tag_name }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      # SBOM attach runs on the initial push-triggered release only.
      # workflow_dispatch re-fires skip it; the SBOM is already on
      # the GitHub release for an existing tag.
      - run: uv run cyclonedx-py environment -o sbom.spdx.json
        if: github.event_name == 'push'
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        if: github.event_name == 'push'
        with:
          tag_name: ${{ env.PUBLISH_TAG }}
          files: sbom.spdx.json
      - run: uv build
      # Pre-flight gates (see scripts/check_dist_metadata.py): the long
      # description must render, and name/version/classifiers/URLs must
      # match the release contract — version is pinned to the tag. twine
      # runs via uvx so it stays out of the project dependency tree
      # (mirrors `make release-preflight`).
      - run: uvx --from 'twine>=6.1' twine check --strict dist/*
      - run: uv run python scripts/check_dist_metadata.py --expect-tag "$PUBLISH_TAG"
      # Runs whenever production PyPI is the destination: every runtime
      # dep must resolve from pypi.org (a TestPyPI-only dep — harl-aht
      # historically — would break end-user installs).
      - run: uv run python scripts/check_dist_metadata.py --expect-tag "$PUBLISH_TAG" --check-resolvable
        if: github.event_name == 'push' || inputs.publish_pypi
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: 'dist/*'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # TestPyPI upload — the pre-release smoke check ahead of the
  # production publish below. OIDC trusted publishing; no API token.
  # The TestPyPI-side trusted-publisher mapping for this repo +
  # workflow has no environment attached. --check-url makes re-fires
  # idempotent: files already on the index that are byte-identical
  # (hatchling builds are reproducible) are skipped instead of failing
  # the run. A metadata respin of an already-published version still
  # needs publish_testpypi=false — its rebuilt files differ, and the
  # index rejects filename reuse.
  publish-testpypi:
    runs-on: ubuntu-latest
    needs: [release-please, build]
    if: |
      !cancelled() && needs.build.result == 'success' && (
        needs.release-please.outputs.release_created == 'true'
        || (github.event_name == 'workflow_dispatch' && inputs.publish_testpypi)
      )
    permissions:
      id-token: write  # PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - run: uv publish --publish-url https://test.pypi.org/legacy/ --check-url https://test.pypi.org/simple/ --trusted-publishing always

  # Production-PyPI publish. Gated on the TestPyPI smoke check (unless
  # that was explicitly skipped for a version that already exists on
  # TestPyPI) and on the "pypi" GitHub environment, whose
  # trusted-publisher / pending-publisher mapping must exist on
  # pypi.org. Protection rules on the environment (e.g. required
  # reviewers) add a manual approval step here if desired.
  publish-pypi:
    runs-on: ubuntu-latest
    needs: [release-please, build, publish-testpypi]
    if: |
      !cancelled() && needs.build.result == 'success'
      && contains(fromJSON('["success", "skipped"]'), needs.publish-testpypi.result)
      && (
        needs.release-please.outputs.release_created == 'true'
        || (github.event_name == 'workflow_dispatch' && inputs.publish_pypi)
      )
    environment:
      name: pypi
      url: https://pypi.org/project/concerto-multirobot/
    permissions:
      id-token: write  # PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      # --check-url lets a re-dispatch after a transient failure skip
      # files the index already holds instead of erroring on the
      # duplicate upload.
      - run: uv publish --check-url https://pypi.org/simple/ --trusted-publishing always
