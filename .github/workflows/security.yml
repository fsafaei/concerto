name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"  # weekly Monday 02:00 UTC (OSSF Scorecard)

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  osv-scan:
    name: OSV-Scanner
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@764c91816374ff2d8fc2095dab36eecd42d61638  # v1.9.2
    with:
      scan-args: |-
        --lockfile=uv.lock
        --recursive

  codeql:
    name: CodeQL
    if: false  # re-enable once the repo is public and Code Scanning is turned on
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: github/codeql-action/init@9e8d0789d4a0fa9ceb6b1738f7e269594bdd67f0  # v3.28.9
        with:
          languages: python
      - uses: github/codeql-action/analyze@9e8d0789d4a0fa9ceb6b1738f7e269594bdd67f0  # v3.28.9

  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46  # v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false  # requires public repo + Code Scanning; re-enable when public
      - uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1  # v4.6.1
        with:
          name: scorecard-results
          path: scorecard-results.sarif
      - uses: github/codeql-action/upload-sarif@9e8d0789d4a0fa9ceb6b1738f7e269594bdd67f0  # v3.28.9
        continue-on-error: true  # requires Code Scanning; re-enable once repo is public
        with:
          sarif_file: scorecard-results.sarif
