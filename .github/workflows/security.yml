name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"  # weekly Monday 02:00 UTC (OSSF Scorecard)

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # OSV-Scanner runs the CLI directly so the job exits non-zero on
  # vulnerabilities without uploading SARIF — the SARIF-upload step in
  # google/osv-scanner-action's reusable workflow requires GitHub Code
  # Scanning, which needs a public repo or GitHub Advanced Security
  # (the CodeQL + Scorecard jobs below are gated for the same reason).
  # Re-introduce the reusable workflow once the repo is public per
  # P5 (open-source from day one).
  osv-scan:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install osv-scanner
        run: |
          set -euo pipefail
          OSV_VERSION="2.0.2"
          curl -fsSL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version
      - name: Scan uv.lock
        # ``osv-scanner.toml`` at the repo root carries the accepted-risk
        # ignore list for advisories blocked by ADR-pinned dep ranges.
        run: osv-scanner --config=osv-scanner.toml --lockfile=uv.lock --recursive .

  codeql:
    name: CodeQL
    if: false  # re-enable once the repo is public and Code Scanning is turned on
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          languages: python
      - uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4

  scorecard:
    name: OSSF Scorecard
    if: false  # ossf/scorecard-action requires a public repo; re-enable when public
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false  # requires public repo + Code Scanning; re-enable when public
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-results
          path: scorecard-results.sarif
      - uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        continue-on-error: true  # requires Code Scanning; re-enable once repo is public
        with:
          sarif_file: scorecard-results.sarif
