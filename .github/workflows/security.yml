name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"  # weekly Monday 02:00 UTC (OSSF Scorecard)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # OSV-Scanner runs the CLI directly so the job exits non-zero on
  # vulnerabilities without uploading SARIF — the SARIF-upload step in
  # google/osv-scanner-action's reusable workflow requires GitHub Code
  # Scanning, which needs a public repo or GitHub Advanced Security
  # (the CodeQL + Scorecard jobs below are gated for the same reason).
  # Re-introduce the reusable workflow once the repo is public per
  # P5 (open-source from day one).
  osv-scan:
    name: OSV-Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install osv-scanner
        run: |
          set -euo pipefail
          OSV_VERSION="2.0.2"
          curl -fsSL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version
      - name: Scan uv.lock
        # ``osv-scanner.toml`` at the repo root carries the accepted-risk
        # ignore list for advisories blocked by ADR-pinned dep ranges.
        run: osv-scanner --config=osv-scanner.toml --lockfile=uv.lock --recursive .

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          languages: python
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2

  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true  # repo is public; results are submitted to the OSSF dashboard
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-results
          path: scorecard-results.sarif
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: scorecard-results.sarif
