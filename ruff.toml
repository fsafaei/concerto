target-version = "py311"
line-length = 100

[lint]
extend-select = [
  "E", "W", "F", "I", "N", "B", "A", "S", "C4", "PIE", "PT", "RET", "SIM",
  "ARG", "PL", "RUF", "UP", "PERF", "LOG", "G", "TID", "TCH", "ANN", "D",
]
ignore = [
  "D203", "D213",              # one-blank-line vs two-blank-line conflict (we use D211/D212)
  "PLR0913",                   # function arg count — RL constructors are wide
  "ANN101", "ANN102",          # annotating self/cls is not standard practice
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ANN", "D", "ARG002", "PLR2004", "B007", "PLC0415", "N803", "N806"]  # asserts, stubs, magic values OK in tests; PLC0415: lazy ManiSkill probe imports; N803/N806: QP / linear-algebra math notation matches src/concerto/safety convention
"src/chamber/benchmarks/**/*.py" = ["PLC0415"]  # lazy ManiSkill imports required (GPU availability gating)
"src/chamber/utils/**/*.py" = ["PLC0415"]      # lazy ManiSkill/torch imports required (availability probing)
"src/chamber/cli/**/*.py" = ["T20"]       # print-allowed in CLI
"src/concerto/safety/**/*.py" = ["N803", "N806"]  # QP / linear-algebra math notation (P, A, M, J, K capitals) per plan/03 §3.7 + ADR-004 §Decision; matches numpy/scipy/cvxpy/qpsolvers convention

[lint.pydocstyle]
convention = "google"

[format]
docstring-code-format = true
