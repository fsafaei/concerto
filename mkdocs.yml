              - imp_stiff_high: reference/partners/cocarry_partners-v2/imp_stiff_high.md
              - imp_damp_low: reference/partners/cocarry_partners-v2/imp_damp_low.md
              - imp_damp_high: reference/partners/cocarry_partners-v2/imp_damp_high.md
              - imp_slow: reference/partners/cocarry_partners-v2/imp_slow.md
              - imp_fast: reference/partners/cocarry_partners-v2/imp_fast.md
