site_name: CONCERTO
site_url: https://fsafaei.github.io/concerto/
repo_url: https://github.com/fsafaei/concerto
edit_uri: edit/main/docs/

theme:
  name: material
  # Material renders the header with the primary colour (default: indigo)
  # for both ``default`` and ``slate`` palettes, so a single white-text
  # variant works for both — no per-palette swap needed.
  logo: assets/dark_mode.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
    - scheme: slate

extra_css:
  - stylesheets/logo-theme-swap.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_signature_annotations: true
            separate_signature: true
            docstring_section_style: list
  - mike

markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Tutorials:
      - Hello-spike: tutorials/hello-spike.md
      - Run Stage 0 smoke: tutorials/stage0-smoke.md
  - How-to:
      - Add a new partner class: how-to/add-partner.md
      - Add a new safety filter: how-to/add-filter.md
      - Run a spike with a custom hypothesis: how-to/run-spike.md
      - Submit a leaderboard entry: how-to/submit-leaderboard.md
      - Run on a GPU host: how-to/run-on-gpu.md
  - Reference:
      - API: reference/api.md
      - ADRs: reference/adrs.md
      # Task cards are generated by scripts/render_task_cards.py from the
      # chamber.tasks registry (ADR-027) — edit src/chamber/tasks/, not the
      # files. A new registered task needs its nav row added here (mkdocs
      # --strict fails on orphan pages, which is the intended drift guard).
      - Tasks:
          - reference/tasks/index.md
          - stage0_smoke: reference/tasks/stage0_smoke.md
          - mpe_cooperative_push: reference/tasks/mpe_cooperative_push.md
          - stage1_pickplace_as: reference/tasks/stage1_pickplace_as.md
          - stage1_pickplace_om: reference/tasks/stage1_pickplace_om.md
          - cocarry: reference/tasks/cocarry.md
          - handover_place: reference/tasks/handover_place.md
          - coinsert: reference/tasks/coinsert.md
          - co_hold_secure: reference/tasks/co_hold_secure.md
          - amr_handover_dynamic: reference/tasks/amr_handover_dynamic.md
      - Glossary: reference/glossary.md
      - Literature: reference/literature.md
      - Standards: reference/standards.md
      - Evaluation: reference/evaluation.md
      - Observability: observability.md
  - Explanation:
      - Why heterogeneous AHT?: explanation/why-aht.md
      - Why fork ManiSkill v3?: explanation/why-maniskill.md
      - Why conformal CBFs?: explanation/why-conformal.md
      - Project principles: explanation/principles.md
      - Threat model: explanation/threat-model.md
      - Phase 0 results: explanation/phase0-results.md
