site_name: CONCERTO
site_url: https://fsafaei.github.io/concerto/
repo_url: https://github.com/fsafaei/concerto
edit_uri: edit/main/docs/

theme:
  name: material
  # Material renders the header with the primary colour (default: indigo)
  # for both ``default`` and ``slate`` palettes, so a single white-text
  # variant works for both — no per-palette swap needed.
  logo: assets/dark_mode.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
    - scheme: slate

extra_css:
  - stylesheets/logo-theme-swap.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_signature_annotations: true
            separate_signature: true
            docstring_section_style: list
  - mike

markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Tutorials:
      - Hello-spike: tutorials/hello-spike.md
      - Run Stage 0 smoke: tutorials/stage0-smoke.md
  - How-to:
      - Reproduce the leaderboard results: how-to/reproduce-results.md
      - Submit a leaderboard entry: how-to/submit-leaderboard.md
      - Add a new partner class: how-to/add-partner.md
      - Add a new safety filter: how-to/add-filter.md
      - Run a spike with a custom hypothesis: how-to/run-spike.md
      - Run on a GPU host: how-to/run-on-gpu.md
  - Reference:
      - API: reference/api.md
      - ADRs: reference/adrs.md
      # Task cards are generated by scripts/render_task_cards.py from the
      # chamber.tasks registry (ADR-027) — edit src/chamber/tasks/, not the
      # files. A new registered task needs its nav row added here (mkdocs
      # --strict fails on orphan pages, which is the intended drift guard).
      - Tasks:
          - reference/tasks/index.md
          - stage0_smoke: reference/tasks/stage0_smoke.md
          - mpe_cooperative_push: reference/tasks/mpe_cooperative_push.md
          - stage1_pickplace_as: reference/tasks/stage1_pickplace_as.md
          - stage1_pickplace_om: reference/tasks/stage1_pickplace_om.md
          - cocarry: reference/tasks/cocarry.md
          - handover_place: reference/tasks/handover_place.md
          - coinsert: reference/tasks/coinsert.md
          - co_hold_secure: reference/tasks/co_hold_secure.md
          - amr_handover_dynamic: reference/tasks/amr_handover_dynamic.md
      # Partner cards are generated by scripts/render_partner_cards.py from
      # the chamber.partners.sets registry + the committed fingerprint
      # archives (ADR-009 as amended) — edit src/chamber/partners/, not the
      # files. A new set or member needs its nav rows added here (mkdocs
      # --strict fails on orphan pages, the intended drift guard).
      - Partners:
          - reference/partners/index.md
          - cocarry_partners v1:
              - reference/partners/cocarry_partners-v1/index.md
              - imp_nominal: reference/partners/cocarry_partners-v1/imp_nominal.md
              - imp_stiff_low: reference/partners/cocarry_partners-v1/imp_stiff_low.md
              - imp_stiff_high: reference/partners/cocarry_partners-v1/imp_stiff_high.md
              - imp_damp_low: reference/partners/cocarry_partners-v1/imp_damp_low.md
              - imp_damp_high: reference/partners/cocarry_partners-v1/imp_damp_high.md
              - imp_slow: reference/partners/cocarry_partners-v1/imp_slow.md
              - imp_fast: reference/partners/cocarry_partners-v1/imp_fast.md
              - imp_lag_bounded: reference/partners/cocarry_partners-v1/imp_lag_bounded.md
              - imp_blend_a: reference/partners/cocarry_partners-v1/imp_blend_a.md
              - imp_blend_b: reference/partners/cocarry_partners-v1/imp_blend_b.md
              - imp_blend_c: reference/partners/cocarry_partners-v1/imp_blend_c.md
          - cocarry_partners v2:
